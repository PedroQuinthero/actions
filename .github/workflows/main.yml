name: Deploy Workflow
env:
    DEPLOY_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

on:
    push:
      branches: [main]
       
jobs:
    ci:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v3


        - name: Deploy
        #  if: github.ref == 'refs/heads/main'
          run: |
            curl "$DEPLOY_URL"
  